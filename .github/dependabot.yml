version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    # Group all security fixes into a single PR when possible
    groups:
      security-fixes:
        applies-to: security-updates
        patterns:
          - "*"
